# GitLab CI/CD Pipeline — Security Orchestration Flow
# Runs full security scan suite on every push/MR
#
# The 4-agent Duo Custom Flow is SEPARATE from this CI pipeline.
# This pipeline:
#   (a) runs real security scans (semgrep, bandit, safety, pip-audit)
#   (b) runs pytest tests
#   (c) produces scan artifacts that the Discovery agent reads via list_vulnerabilities
#
# The Custom Flow is triggered by mentioning @ai-secflow in an MR comment.

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - security-scan

variables:
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp"
  DS_EXCLUDED_PATHS: "spec, test, tests, tmp"
  SECURE_LOG_LEVEL: "info"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ── Pytest + YAML structure tests ─────────────────────────────────────────────
pytest:
  stage: test
  image: python:3.11-slim
  cache:
    paths:
      - .cache/pip
  before_script:
    - pip install pytest pyyaml flask
  script:
    - pytest tests/ -v --tb=short
  artifacts:
    reports:
      junit: test-results.xml
    paths:
      - test-results.xml
    expire_in: 1 week

# ── Semgrep SAST ──────────────────────────────────────────────────────────────
semgrep:
  stage: security-scan
  image: semgrep/semgrep:latest
  script:
    - >
      semgrep scan
      --config=p/owasp-top-ten
      --config=p/python
      --config=p/secrets
      --config=p/sql-injection
      --config=p/command-injection
      --json
      --output=semgrep-results.json
      vulnerable_app/
    - semgrep scan
      --config=p/owasp-top-ten
      --config=p/python
      vulnerable_app/
  artifacts:
    reports:
      sast: semgrep-results.json
    paths:
      - semgrep-results.json
    expire_in: 1 week
  allow_failure: true

# ── Bandit Python security linter ─────────────────────────────────────────────
bandit:
  stage: security-scan
  image: python:3.11-slim
  before_script:
    - pip install "bandit[toml]>=1.7.9"
  script:
    # Run bandit; exit 0 to avoid blocking MR (findings go to artifact)
    - bandit -r vulnerable_app/ -f json -o bandit-results.json || true
    # Also print human-readable summary to job log
    - bandit -r vulnerable_app/ -ll || true
    # Fail if HIGH severity issues found (demonstrates real gate)
    - |
      HIGH=$(python3 -c "
      import json, sys
      data = json.load(open('bandit-results.json'))
      highs = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
      print(len(highs))
      ")
      echo "Bandit HIGH severity findings: $HIGH"
      if [ "$HIGH" -gt 0 ]; then
        echo "WARNING: $HIGH HIGH severity issues found — review required"
      fi
  artifacts:
    paths:
      - bandit-results.json
    expire_in: 1 week
  allow_failure: true

# ── Safety SCA ────────────────────────────────────────────────────────────────
safety:
  stage: security-scan
  image: python:3.11-slim
  before_script:
    - pip install "safety>=3.2"
  script:
    - safety check -r vulnerable_app/requirements.txt --json -o safety-results.json || true
    - safety check -r vulnerable_app/requirements.txt || true
    - echo "Safety scan complete — results in safety-results.json"
  artifacts:
    paths:
      - safety-results.json
    expire_in: 1 week
  allow_failure: true

# ── pip-audit (SBOM + CVE check) ──────────────────────────────────────────────
pip-audit:
  stage: security-scan
  image: python:3.11-slim
  before_script:
    - pip install pip-audit
  script:
    - pip install -r vulnerable_app/requirements.txt --quiet || true
    - pip-audit --format=json --output=pip-audit-results.json || true
    - pip-audit || true
    - echo "pip-audit scan complete"
  artifacts:
    paths:
      - pip-audit-results.json
    expire_in: 1 week
  allow_failure: true
